name: Test Tailscale Build (Fast)

on:
  workflow_dispatch:

env:
  SDK_URL: https://mirrors.ustc.edu.cn/immortalwrt/releases/24.10.0/targets/mediatek/filogic/immortalwrt-sdk-24.10.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst

jobs:
  test_build:
    runs-on: ubuntu-22.04

    steps:
      - name: Initialization Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git libssl-dev gettext zlib1g-dev file unzip python3 python3-setuptools zstd

      - name: Download and Setup SDK
        run: |
          echo "Downloading SDK from USTC..."
          wget -O sdk.tar.zst ${{ env.SDK_URL }}
          
          echo "Extracting SDK..."
          # 使用 zstd 解压
          tar --zstd -xf sdk.tar.zst
          
          # 重命名解压后的目录为 'sdk'，方便后续操作
          mv immortalwrt-sdk-* sdk
          
      - name: Clone Tailscale Source
        working-directory: sdk
        run: |
          # 模拟你的操作：拉取代码到 package/tailscale
          git clone https://github.com/GuNanOvO/openwrt-tailscale.git package/tailscale
          
          # 拉取新版 Golang (Tailscale 依赖)
          rm -rf feeds/packages/lang/golang
          git clone https://github.com/sbwml/packages_lang_golang -b 26.x feeds/packages/lang/golang

      - name: Apply Fixes (Critical Step)
        working-directory: sdk
        run: |
          echo "Applying fixes to Makefile..."
          
          # 1. 查找真正的 Makefile 路径 (防止目录嵌套问题)
          TS_MAKEFILE=$(find package -name Makefile | grep "tailscale" | head -n 1)
          echo "Target Makefile: $TS_MAKEFILE"
          
          if [ ! -f "$TS_MAKEFILE" ]; then
            echo "Error: Makefile not found!"
            exit 1
          fi

          # ------------------------------------------------------

          # A. 修复 '/builder' 权限拒绝错误
          sed -i '/\/builder/d' "$TS_MAKEFILE"
          echo "✅ Removed /builder paths"
          echo "--- Content Check (Last 20 lines) ---"
          tail -n 20 "$TS_MAKEFILE"
          echo "-------------------------------------"

      - name: Update Feeds & Configure
        working-directory: sdk
        env:
          TERM: linux
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          make defconfig

          echo "CONFIG_PACKAGE_tailscale=m" >> .config
          make defconfig

      - name: Compile Tailscale
        working-directory: sdk
        env:
          TERM: linux
        run: |
          echo "Starting compilation..."
          make package/tailscale/compile V=s IGNORE_ERRORS=1

      - name: Check Artifacts
        working-directory: sdk
        run: |
          echo "Checking built packages..."
          find bin/packages -name "*tailscale*.ipk"
        
          ls -lh bin/packages/*/base/tailscale*.ipk

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: tailscale-test-package
          path: sdk/bin/packages/*/base/*.ipk
